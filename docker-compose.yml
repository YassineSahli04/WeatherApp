services:
  frontend:
    image: node:24-slim
    working_dir: /app
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - vite_node_modules:/app/node_modules
    command: sh -lc "npm ci && npm run dev -- --host 0.0.0.0"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    depends_on:
      - db
    volumes:
      - ./backend:/app
    environment:
      PORT: 5000
      WEATHER_API_KEY: ${WEATHER_API_KEY:-}
      WEATHER_API_BASE_URL: https://api.weatherapi.com/v1
      PGHOST: db
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: WeatherDb

  db:
    image: postgres:17
    environment:
      POSTGRES_DB: WeatherDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  vite_node_modules:
  pgdata:
