services:
  frontend:
    image: node:24-slim
    working_dir: /app
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - vite_node_modules:/app/node_modules
    command: sh -lc "npm ci && npm run dev -- --host 0.0.0.0"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    depends_on:
      - db
    volumes:
      - ./backend:/app/backend
    environment:
      POSTGRES_DB: WeatherDb
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

  db:
    image: postgres:18
    environment:
      POSTGRES_DB: WeatherDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  vite_node_modules:
  pgdata:
